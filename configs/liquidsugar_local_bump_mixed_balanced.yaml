input_csv: /gpfs/projects/p32954/dimf_liquid_sugar_repo-490/data/LiquidSugar.csv
output_root: /gpfs/projects/p32954/liquidsugar_lag_framework/outputs
experiment_name: liquidsugar_local_bump_stage12_smooth_mixed_balanced

timestamp_col: TimeStamp
target_col: yield_flow
nominal_step_minutes: 15

feature_prefix:
  feed: feed_
  stage1: stage1_
  stage2: stage2_
  stage3: stage3_

g_break_minutes: 120

split:
  train_ratio: 0.7
  val_ratio: 0.1
  test_ratio: 0.2
  allocation_unit: effective_windows
  min_segments:
    train: 2
    val: 2
    test: 2

seed: 42

window:
  history_steps: 96
  horizon_steps: 4

local_bump:
  shape: smooth
  dmax_choices: [2, 4, 6]
  width: 12
  inject_ratio: 0.5
  margin: 28
  enforce_predictable_region: true
  require_raw_positive_timestamps: true
  dmax_assignment:
    mode: balanced_by_effective_windows
    min_segments_per_dmax:
      test: 2
